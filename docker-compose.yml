version: '3.8'

services:
  tooplay-vector-db:
    image: pgvector/pgvector:pg16
    container_name: ai-vector-container
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_rag_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123!
    volumes:
      - postgres_vector_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_vector_data: